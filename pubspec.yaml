name: delivery_mobile
description: "Умная доставка - мобильное приложение"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ============================================
  # ЛОКАЛИЗАЦИЯ (ДЛЯ РУССКОГО ЯЗЫКА)
  # ============================================
  flutter_localizations:
    sdk: flutter

  # ============================================
  # СЕТЬ
  # ============================================
  http: ^1.1.0                 # REST API (Spring Boot)
  web_socket_channel: ^2.4.0   # WebSocket (Go-трекер)

  # ============================================
  # GPS
  # ============================================
  geolocator: ^10.1.0          # Геолокация

  # ============================================
  # УПРАВЛЕНИЕ СОСТОЯНИЕМ
  # ============================================
  provider: ^6.1.1

  # ============================================
  # UI
  # ============================================
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
